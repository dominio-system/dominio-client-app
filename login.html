<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Sprint 1D · Content Security Policy para login window -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src 'self' data: https://fonts.gstatic.com;
  img-src 'self' data: https:;
  connect-src 'self' https://ywlyuuddqitduqtdttgo.supabase.co wss://ywlyuuddqitduqtdttgo.supabase.co;
  frame-src 'none';
  object-src 'none';
  base-uri 'self';
  form-action 'self';
">
<title>Dominio System — Acceso</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg:      #0c0c0c;
    --card:    #141414;
    --card2:   #1a1a1a;
    --border:  rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --accent:  #e8e8e8;
    --text:    #f0f0f0;
    --text2:   #aaaaaa;
    --text3:   #555555;
    --success: #4ade80;
    --danger:  #f87171;
    --warn:    #fbbf24;
  }

  html, body {
    width:460px; height:580px;
    background:var(--bg);
    font-family:'Inter',sans-serif;
    color:var(--text);
    overflow:hidden;
    user-select:none;
    -webkit-app-region:no-drag;
  }

  /* ── Custom Titlebar ── */
  .titlebar {
    height:32px;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    padding:0 12px;
    -webkit-app-region:drag;
    position:fixed;
    top:0; left:0; right:0;
    z-index:100;
  }
  .titlebar-btn {
    width:12px; height:12px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    margin-left:6px;
    -webkit-app-region:no-drag;
    transition:opacity .15s;
  }
  .titlebar-btn:hover { opacity:.7; }
  .tb-close    { background:#ff5f57; }
  .tb-minimize { background:#febc2e; }

  /* ── Main Layout ── */
  .container {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100%;
    padding:40px 48px;
  }

  /* ── Logo ── */
  .logo-wrap {
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:32px;
  }
  .logo-icon {
    width:36px; height:36px;
    background:var(--card2);
    border:1px solid var(--border2);
    border-radius:8px;
    display:flex; align-items:center; justify-content:center;
  }
  .logo-name {
    font-size:16px;
    font-weight:600;
    letter-spacing:-.3px;
    color:var(--text);
  }
  .logo-tag {
    font-size:9px;
    letter-spacing:2px;
    color:var(--text3);
    font-weight:500;
    margin-top:2px;
  }

  /* ── Card ── */
  .card {
    width:100%;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:28px 28px 24px;
  }

  .card-title {
    font-size:14px;
    font-weight:600;
    color:var(--text);
    margin-bottom:4px;
  }
  .card-sub {
    font-size:11px;
    color:var(--text3);
    margin-bottom:24px;
  }

  /* ── Form ── */
  .field { margin-bottom:14px; }
  .field label {
    display:block;
    font-size:10px;
    letter-spacing:1.5px;
    color:var(--text3);
    font-weight:500;
    margin-bottom:6px;
    font-family:'SF Mono','Courier New',monospace;
  }
  .field input {
    width:100%;
    background:var(--card2);
    border:1px solid var(--border2);
    border-radius:7px;
    padding:10px 13px;
    font-size:13px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    outline:none;
    transition:border-color .15s, box-shadow .15s;
    -webkit-app-region:no-drag;
  }
  .field input:focus {
    border-color:rgba(255,255,255,0.28);
    box-shadow:0 0 0 3px rgba(255,255,255,0.04);
  }
  .field input::placeholder { color:var(--text3); }

  /* ── Button ── */
  .btn-primary {
    width:100%;
    padding:11px;
    background:var(--accent);
    color:#0c0c0c;
    border:none;
    border-radius:7px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    font-family:'Inter',sans-serif;
    transition:opacity .15s, transform .1s;
    margin-top:4px;
    -webkit-app-region:no-drag;
  }
  .btn-primary:hover  { opacity:.88; }
  .btn-primary:active { transform:scale(.98); }
  .btn-primary:disabled { opacity:.4; cursor:not-allowed; transform:none; }

  /* ── Error / Status ── */
  .status {
    min-height:20px;
    font-size:11px;
    text-align:center;
    margin-top:12px;
    transition:opacity .2s;
  }
  .status.error   { color:var(--danger); }
  .status.success { color:var(--success); }
  .status.loading { color:var(--text3); }

  /* ── Forgot / Footer ── */
  .link-row {
    text-align:center;
    margin-top:16px;
    font-size:11px;
    color:var(--text3);
  }
  .link-row a {
    color:var(--text2);
    text-decoration:none;
    cursor:pointer;
    -webkit-app-region:no-drag;
  }
  .link-row a:hover { color:var(--text); }

  /* ── Loading spinner ── */
  @keyframes spin { to { transform:rotate(360deg); } }
  .spinner {
    width:14px; height:14px;
    border:2px solid rgba(0,0,0,0.2);
    border-top-color:#0c0c0c;
    border-radius:50%;
    animation:spin .6s linear infinite;
    display:inline-block;
    vertical-align:middle;
    margin-right:6px;
  }

  /* ── Forgot password mode ── */
  .forgot-panel { display:none; }
  .forgot-panel.active { display:block; }
  .login-panel.hidden  { display:none; }

  /* ── Version badge ── */
  .version {
    position:fixed;
    bottom:10px;
    font-size:9px;
    color:var(--text3);
    letter-spacing:.5px;
  }
</style>
</head>
<body>

<!-- Titlebar (custom, frameless) -->
<div class="titlebar">
  <button class="titlebar-btn tb-close"    onclick="window.electronAPI?.close()"    title="Cerrar"></button>
  <button class="titlebar-btn tb-minimize" onclick="window.electronAPI?.minimize()" title="Minimizar"></button>
</div>

<!-- Main -->
<div class="container">

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-icon">
      <!-- Signal Pulse SVG -->
      <svg width="20" height="13" viewBox="0 0 20 13" fill="none">
        <path d="M0 6.5H2.5V1H6V12H9.5V1H13V6.5H16"
              stroke="#e8e8e8" stroke-width="1.5"
              stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
        <circle cx="18.5" cy="6.5" r="1.5" fill="#e8e8e8"/>
      </svg>
    </div>
    <div>
      <div class="logo-name">Dominio System</div>
      <div class="logo-tag">DASHBOARD DE CLIENTE</div>
    </div>
  </div>

  <!-- Login Card -->
  <div class="card">

    <!-- LOGIN PANEL -->
    <div id="loginPanel" class="login-panel">
      <div class="card-title">Acceso a tu dashboard</div>
      <div class="card-sub">Ingresa con tu cuenta de Dominio System</div>

      <div class="field">
        <label>EMAIL</label>
        <input type="email" id="email" placeholder="tu@email.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>CONTRASEÑA</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
               onkeydown="if(event.key==='Enter') doLogin()" />
      </div>

      <button class="btn-primary" id="loginBtn" onclick="doLogin()">
        Entrar al Dashboard
      </button>

      <div class="status" id="status"></div>
    </div>

    <!-- FORGOT PASSWORD PANEL -->
    <div id="forgotPanel" class="forgot-panel">
      <div class="card-title">Recuperar acceso</div>
      <div class="card-sub">Te enviaremos un link a tu correo</div>

      <div class="field">
        <label>EMAIL</label>
        <input type="email" id="resetEmail" placeholder="tu@email.com" autocomplete="email"
               onkeydown="if(event.key==='Enter') doReset()" />
      </div>

      <button class="btn-primary" id="resetBtn" onclick="doReset()">
        Enviar link de recuperación
      </button>

      <div class="status" id="resetStatus"></div>
    </div>

  </div><!-- .card -->

  <!-- Footer links -->
  <div class="link-row" id="footerLinks">
    <a onclick="showForgot()">¿Olvidaste tu contraseña?</a>
    &nbsp;·&nbsp;
    <a onclick="window.electronAPI?.openExternal('https://dominiosystem.com')">dominiosystem.com</a>
  </div>

</div><!-- .container -->

<div class="version" id="versionBadge">v1.0.0</div>

<!-- Supabase CDN (SRI-pinned v2.45.4) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"
        integrity="sha384-GFr3yTh5lJznCbZfpTtXnwboFsxqtTQoeTZCRHhE0579KrRmlCzen5AA8ohaB5ug"
        crossorigin="anonymous"></script>

<script>
// ── Supabase config ─────────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://ywlyuuddqitduqtdttgo.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bHl1dWRkcWl0ZHVxdGR0dGdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNDg2MzgsImV4cCI6MjA4OTYyNDYzOH0.vpjRNcQ_v2Vo9M2oQsCq95mSLOCctRf6cO4sWzpNCF8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── Login ───────────────────────────────────────────────────────────────────
async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');
  const status   = document.getElementById('status');

  if (!email || !password) {
    showStatus(status, 'Completa email y contraseña', 'error');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Verificando...';
  clearStatus(status);

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      showStatus(status, translateError(error.message), 'error');
      resetBtn(btn, 'Entrar al Dashboard');
      return;
    }

    const userId       = data.user.id;
    const userEmail    = data.user.email;
    const accessToken  = data.session.access_token;
    const refreshToken = data.session.refresh_token;
    const expiresAt    = data.session.expires_at;

    // Verify this user has a client record in the clients table
    const { data: clientRows } = await sb
      .from('clients')
      .select('id, empresa, nombre')
      .eq('id', userId)
      .limit(1);

    let clientId = null;
    let empresa = null;
    let nombre = null;

    if (clientRows && clientRows.length > 0) {
      clientId = clientRows[0].id;
      empresa = clientRows[0].empresa;
      nombre = clientRows[0].nombre;
    } else {
      // Try by email field
      const { data: byEmail } = await sb
        .from('clients')
        .select('id, empresa, nombre')
        .eq('email', email)
        .eq('status', 'activo')
        .limit(1);

      if (!byEmail || byEmail.length === 0) {
        showStatus(status, 'No encontramos tu cuenta activa. Contacta a tu asesor.', 'error');
        resetBtn(btn, 'Entrar al Dashboard');
        return;
      }
      clientId = byEmail[0].id;
      empresa = byEmail[0].empresa;
      nombre = byEmail[0].nombre;
    }

    showStatus(status, '¡Bienvenido! Cargando tu dashboard...', 'success');
    setTimeout(() => {
      window.electronAPI.loginSuccess({
        accessToken,
        refreshToken,
        expiresAt,
        userId,
        clientId,
        email: userEmail,
        empresa,
        nombre,
      });
    }, 800);

  } catch (err) {
    showStatus(status, 'Error de conexión. Verifica tu internet.', 'error');
    resetBtn(btn, 'Entrar al Dashboard');
  }
}

// ── Forgot Password ─────────────────────────────────────────────────────────
async function doReset() {
  const email  = document.getElementById('resetEmail').value.trim();
  const btn    = document.getElementById('resetBtn');
  const status = document.getElementById('resetStatus');

  if (!email) { showStatus(status, 'Ingresa tu email', 'error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Enviando...';

  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://www.dominiosystem.com/reset',
  });

  if (error) {
    showStatus(status, 'Error al enviar. Intenta de nuevo.', 'error');
  } else {
    showStatus(status, 'Link enviado a tu correo ✓', 'success');
    btn.innerHTML = 'Enviado ✓';
    setTimeout(() => showLogin(), 3000);
    return;
  }
  resetBtn(btn, 'Enviar link de recuperación');
}

// ── Panel toggle ─────────────────────────────────────────────────────────────
function showForgot() {
  document.getElementById('loginPanel').classList.add('hidden');
  document.getElementById('forgotPanel').classList.add('active');
  document.getElementById('footerLinks').innerHTML =
    '<a onclick="showLogin()">← Volver al login</a>';
}
function showLogin() {
  document.getElementById('loginPanel').classList.remove('hidden');
  document.getElementById('forgotPanel').classList.remove('active');
  document.getElementById('footerLinks').innerHTML =
    '<a onclick="showForgot()">¿Olvidaste tu contraseña?</a> &nbsp;·&nbsp; <a onclick="window.electronAPI?.openExternal(\'https://dominiosystem.com\')">dominiosystem.com</a>';
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function showStatus(el, msg, type) {
  el.textContent = msg;
  el.className   = `status ${type}`;
}
function clearStatus(el) { el.textContent = ''; el.className = 'status'; }
function resetBtn(btn, label) { btn.disabled = false; btn.innerHTML = label; }

function translateError(msg) {
  if (msg.includes('Invalid login')) return 'Email o contraseña incorrectos';
  if (msg.includes('Email not confirmed')) return 'Confirma tu email antes de entrar';
  if (msg.includes('Too many requests')) return 'Demasiados intentos. Espera 1 minuto';
  return 'Error: ' + msg;
}

// ── Auto-focus ───────────────────────────────────────────────────────────────
// NOTA: el auto-login ahora lo maneja el main process de Electron via safeStorage.
// Cuando la app arranca, main.js verifica sesión persistida y abre dashboard directo.
// Esta ventana de login solo aparece cuando NO hay sesión válida.
window.onload = () => {
  document.getElementById('email').focus();
};
</script>

</body>
</html>
